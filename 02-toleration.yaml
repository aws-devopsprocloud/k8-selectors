apiVersion: v1 
kind: Pod 
metadata: 
  name: toleration-demo
spec:
  containers: 
  - name: nginx 
    image: nginx 
    ports:
    - containerPort: 80 
  tolerations:
  - key: "project"
    operator: "Exists"
    effect: "NoSchedule"

    # If we put Operator as equal, then we have to mention the value as well 
  # tolerations:
  # - key: "key1"
  #   operator: "Equal"
  #   value: "value1"
  #   effect: "NoSchedule"