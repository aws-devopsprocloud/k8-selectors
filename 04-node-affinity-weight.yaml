apiVersion: v1
kind: Pod
metadata:
  name: node-affinity-weight
spec:
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 49
        preference:
          matchExpressions:
          - key: project
            operator: In
            values:
            - amazon  
      - weight: 51
        preference:
          matchExpressions:
          - key: project
            operator: In
            values:
            - roboshop          
  containers:
  - name: nginx
    image: nginx
    imagePullPolicy: IfNotPresent
