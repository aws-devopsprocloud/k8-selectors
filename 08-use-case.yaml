apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-server
spec:
  selector:
    matchLabels:
      name: db-server 
  replicas: 2
  template:
    metadata:
      labels:
        name: db-server 
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: name 
                operator: In
                values:
                - db-server 
            topologyKey: "kubernetes.io/hostname"
        # podAffinity:
        #   requiredDuringSchedulingIgnoredDuringExecution:
        #   - labelSelector:
        #       matchExpressions:
        #       - key: app
        #         operator: In
        #         values:
        #         - store
        #     topologyKey: "kubernetes.io/hostname"
      containers:
      - name: db-server 
        image: redis 

--- 
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-server
spec:
  selector:
    matchLabels:
      name: web-server 
  replicas: 2
  template:
    metadata:
      labels:
        name: web-server 
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: name 
                operator: In
                values:
                - web-server 
            topologyKey: "kubernetes.io/hostname"
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: name
                operator: In
                values:
                - db-server 
            topologyKey: "kubernetes.io/hostname"
      containers:
      - name: web-server 
        image: nginx 


#-----------------------------
# db-server Deployment       |
#-----------------------------
# podAntiAffinity is configured against pods with the label name=db-server.
# This ensures that multiple db-server replicas are not scheduled on the same node.
# Since there are 2 replicas and 2 nodes available:
# Replica 1 is scheduled on Node-1.
# Replica 2 cannot be scheduled on Node-1 because of Pod Anti-Affinity, so it is scheduled on Node-2.

#-----------------------------
# web-server Deployment      |
#------------------------------
# The web-server deployment has two rules:

# Pod Anti-Affinity
#--------------------
# A web-server pod must not be scheduled on a node that already contains another web-server pod.

# Pod Affinity
#--------------------
# A web-server pod must be scheduled on a node that contains a db-server pod.


#-----------------------------
# First web-server Replica   |
#-----------------------------
# No web-server pods exist yet, so the Anti-Affinity rule does not exclude any node.
# Both Node-1 and Node-2 contain a db-server pod, satisfying the Affinity rule.
# Kubernetes can place the first replica on either node (assume Node-1).

#-----------------------------
# Second web-server Replica  |
# ----------------------------
# Pod Anti-Affinity prevents scheduling on Node-1 because web-server-1 is already running there.
# Pod Affinity requires the pod to be scheduled on a node containing a db-server pod.
# Node-2 contains db-server-2 and does not contain a web-server pod.
